name: ticketkona
description: A new Flutter project.
publish_to: 'none'

version: 1.2.1+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  qr_code_scanner: ^1.0.1
  webview_flutter: ^4.13.0
  http: ^1.3.0
  audioplayers: ^6.1.0      # scan result beep sounds
  vibration: ^2.0.0         # scan result haptic feedback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
   - assets/images/
   - assets/sounds/